name: Add User to Track

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'VRChat Display Name to track'
        required: true
        type: string

permissions:
  contents: write

jobs:
  add-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Add User Script
        env:
          VRCHAT_USERNAME: ${{ secrets.VRCHAT_USERNAME }}
          VRCHAT_PASSWORD: ${{ secrets.VRCHAT_PASSWORD }}
          TARGET_USERNAME: ${{ github.event.inputs.username }}
        run: node scripts/add-user.js

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/config.json public/data/users.json
          git commit -m "Add tracking for user: ${{ github.event.inputs.username }}" || exit 0
          git push
