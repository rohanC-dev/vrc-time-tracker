name: Track VRChat Playtime

on:
  schedule:
    # Run every 6 hours (at :05 past to leave a small gap)
    - cron: '5 */6 * * *'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: vrc-tracker
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production

      - name: Run tracker
        run: node scripts/track.js
        env:
          VRCHAT_USERNAME: ${{ secrets.VRCHAT_USERNAME }}
          VRCHAT_PASSWORD: ${{ secrets.VRCHAT_PASSWORD }}

      - name: Commit updated data
        run: |
          git config user.name "VRC Tracker Bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add public/data/ data/
          git diff --staged --quiet || git commit -m "📊 Update playtime data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
